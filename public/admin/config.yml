backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pagina's"
    files:
      - file: "public/content/data.json"
        label: "Home Pagina Content"
        name: "home"
        fields:
          - label: "Hero Sectie"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Hoofdtitel", name: "title", widget: "string"}
              - {label: "Subtekst", name: "subtitle", widget: "text"}
              - {label: "Achtergrond Afbeelding", name: "image", widget: "image"}

          - label: "Ons Ambacht"
            name: "craft"
            widget: "object"
            fields:
              - {label: "Sectie Titel", name: "title", widget: "string"}
              - {label: "Algemene Tekst", name: "description", widget: "text"}
              - {label: "Feature 1 Titel", name: "f1Title", widget: "string"}
              - {label: "Feature 1 Tekst", name: "f1Text", widget: "text"}
              - {label: "Feature 2 Titel", name: "f2Title", widget: "string"}
              - {label: "Feature 2 Tekst", name: "f2Text", widget: "text"}
              - {label: "Grote Afbeelding", name: "image", widget: "image"}

          - label: "Live Cooking Reels (Videos)"
            name: "reels"
            widget: "list"
            summary: "Video {{index}}"
            fields:
              - {label: "Video Bestand (.mp4 upload)", name: "video", widget: "file"}
              - {label: "Poster Afbeelding (stilstaand beeld)", name: "poster", widget: "image"}