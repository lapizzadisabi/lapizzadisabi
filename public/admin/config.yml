backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pagina's"
    files:
      - file: "public/content/data.json"
        label: "Home Pagina"
        name: "home"
        fields:
          - label: "Hero Sectie"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Hoofdtitel", name: "title", widget: "string"}
              - {label: "Subtekst", name: "subtitle", widget: "text"}
              - {label: "Achtergrond Afbeelding", name: "image", widget: "image"}

          - label: "Ons Ambacht"
            name: "craft"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Beschrijving", name: "description", widget: "text"}
              - {label: "Afbeelding", name: "image", widget: "image"}

          - label: "Pakketten (Pricing)"
            name: "pricing"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Pakket Naam", name: "title", widget: "string"}
              - {label: "Korte omschrijving", name: "description", widget: "string"}
              - {label: "Prijs (alleen het getal)", name: "price", widget: "string"}
              - {label: "Populairste pakket?", name: "featured", widget: "boolean", default: false}
              - label: "Kenmerken"
                name: "features"
                widget: "list"
                field: {label: "Punt", name: "text", widget: "string"}

          - label: "Live Cooking Reels (Videos)"
            name: "reels"
            widget: "list"
            fields:
              - {label: "Video (.mp4 upload)", name: "video", widget: "file"}
              - {label: "Poster Beeld (foto)", name: "poster", widget: "image"}