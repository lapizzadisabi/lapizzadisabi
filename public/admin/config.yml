backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "public/content/data.json"
        label: "Website Content"
        name: "home"
        fields:
          - label: "Hero Sectie"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Hoofdtitel", name: "title", widget: "string"}
              - {label: "Subtekst", name: "subtitle", widget: "text"}
              - {label: "Achtergrond Afbeelding", name: "image", widget: "image"}

          - label: "Ons Ambacht"
            name: "craft"
            widget: "object"
            fields:
              - {label: "Titel", name: "title", widget: "string"}
              - {label: "Hoofdtekst", name: "description", widget: "text"}
              - {label: "Highlight 1 Titel", name: "h1Title", widget: "string"}
              - {label: "Highlight 1 Tekst", name: "h1Text", widget: "text"}
              - {label: "Highlight 2 Titel", name: "h2Title", widget: "string"}
              - {label: "Highlight 2 Tekst", name: "h2Text", widget: "text"}
              - {label: "Grote Afbeelding", name: "image", widget: "image"}

          - label: "Video Reels (Live Cooking)"
            name: "media"
            widget: "list"
            fields:
              - {label: "Video Bestand (Upload .mp4)", name: "videoFile", widget: "file"}
              - {label: "Omslagafbeelding (Poster)", name: "poster", widget: "image"}