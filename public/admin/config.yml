backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)

media_folder: "public/images" # Folder where uploaded images go
public_folder: "/images" # The URL path for those images

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "public/content/data.json"
        label: "Website Content"
        name: "home"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "text"}
          - {label: "Hero Background Image", name: "heroImage", widget: "image"}