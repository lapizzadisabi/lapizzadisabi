<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Pizza di Sabi | Authentieke Napolitaanse Pizza</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <form name="offerte" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="offerte" />
      <input type="text" name="naam" />
      <input type="text" name="contactinfo" />
      <input type="date" name="datum" />
      <select name="aantal"></select>
      <textarea name="bericht"></textarea>
      <button type="submit">Verstuur</button>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
