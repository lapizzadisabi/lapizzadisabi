<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Pizza di Sabi | Authentieke Napolitaanse Pizza Catering</title>
    <meta name="title" content="La Pizza di Sabi | Authentieke Napolitaanse Pizza Catering">

    <meta name="keywords" content="pizza catering, lapizzadisabi, pizza op locatie, Napolitaanse pizza catering, pizza foodtruck, pizza feestje, pizza chef huren">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lapizzadisabi.nl/">
    <meta property="og:title" content="La Pizza di Sabi | Authentieke Napolitaanse Pizza Catering">

  </head>
  <body>
    <form name="offerte" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="offerte" />
      <input type="text" name="naam" />
      <input type="text" name="contactinfo" />
      <input type="date" name="datum" />
      <select name="aantal"></select>
      <textarea name="bericht"></textarea>
      <button type="submit">Verstuur</button>
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
